<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CUBE // RUNNER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 20px; height: 20px;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(0,255,180,0.8);
  }
  #crosshair::before {
    width: 2px; height: 100%;
    left: 50%; top: 0;
    transform: translateX(-50%);
  }
  #crosshair::after {
    width: 100%; height: 2px;
    top: 50%; left: 0;
    transform: translateY(-50%);
  }

  #hud {
    position: absolute;
    top: 24px; left: 28px;
    color: rgba(0,255,180,0.85);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    line-height: 2;
    text-shadow: 0 0 12px rgba(0,255,180,0.6);
  }
  #hud .label { opacity: 0.5; font-size: 9px; letter-spacing: 0.3em; }
  #hud .value { font-size: 15px; }

  #speed-bar-wrap {
    margin-top: 8px;
    width: 120px;
    height: 3px;
    background: rgba(0,255,180,0.15);
    border: 1px solid rgba(0,255,180,0.3);
  }
  #speed-bar {
    height: 100%;
    background: rgba(0,255,180,0.8);
    width: 0%;
    transition: width 0.1s;
    box-shadow: 0 0 8px rgba(0,255,180,0.8);
  }

  #corner-tl, #corner-tr, #corner-bl, #corner-br {
    position: absolute;
    width: 18px; height: 18px;
    border-color: rgba(0,255,180,0.4);
    border-style: solid;
  }
  #corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  #corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  #corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
  #corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  #overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    color: #fff;
    transition: opacity 0.4s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }

  #overlay h1 {
    font-family: 'Courier New', monospace;
    font-size: clamp(32px, 6vw, 72px);
    letter-spacing: 0.3em;
    color: rgba(0,255,180,1);
    text-shadow: 0 0 30px rgba(0,255,180,0.8), 0 0 60px rgba(0,255,180,0.4);
    margin-bottom: 8px;
  }
  #overlay .sub {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: rgba(0,255,180,0.5);
    text-transform: uppercase;
    margin-bottom: 48px;
  }
  #overlay .controls {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.15em;
    line-height: 2.2;
    text-align: center;
    margin-bottom: 40px;
  }
  #overlay .controls span {
    display: inline-block;
    background: rgba(0,255,180,0.1);
    border: 1px solid rgba(0,255,180,0.3);
    padding: 2px 8px;
    margin: 0 3px;
    color: rgba(0,255,180,0.9);
    font-size: 11px;
  }
  #start-btn {
    background: none;
    border: 1px solid rgba(0,255,180,0.6);
    color: rgba(0,255,180,1);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    padding: 14px 40px;
    cursor: pointer;
    transition: all 0.2s;
    text-shadow: 0 0 10px rgba(0,255,180,0.6);
    box-shadow: 0 0 20px rgba(0,255,180,0.1);
    pointer-events: all;
  }
  #start-btn:hover {
    background: rgba(0,255,180,0.08);
    box-shadow: 0 0 30px rgba(0,255,180,0.3);
    border-color: rgba(0,255,180,1);
  }

  #paused-msg {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(0,255,180,0.8);
    font-size: 13px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    text-shadow: 0 0 20px rgba(0,255,180,0.8);
  }
  #paused-msg.visible { opacity: 1; }

  #wind-hud {
    position: absolute;
    bottom: 28px; left: 28px;
    color: rgba(100,200,255,0.8);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    line-height: 2;
    text-shadow: 0 0 12px rgba(100,200,255,0.5);
  }
  #wind-hud .label { opacity: 0.5; font-size: 9px; letter-spacing: 0.3em; }

  #wind-compass {
    position: relative;
    width: 48px; height: 48px;
    margin-top: 4px;
  }
  #wind-compass svg { width: 100%; height: 100%; }

  #gust-flash {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(100,200,255,0.12) 100%);
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 5;
  }
  #gust-flash.active { opacity: 1; }
</style>
</head>
<body>

<div id="overlay">
  <h1>CUBE</h1>
  <div class="sub">// open world //</div>
  <div class="controls">
    <span>W A S D</span> move &nbsp;&nbsp; <span>MOUSE</span> look <br>
    <span>SPACE</span> jump &nbsp;&nbsp; <span>SHIFT</span> sprint <br>
    <span>WIND</span> blows randomly — you're a plastic bag
  </div>
  <button id="start-btn">CLICK TO PLAY</button>
</div>

<div id="paused-msg">— PAUSED —</div>

<div id="gust-flash"></div>

<div id="ui">
  <div id="corner-tl"></div>
  <div id="corner-tr"></div>
  <div id="corner-bl"></div>
  <div id="corner-br"></div>
  <div id="crosshair"></div>
  <div id="hud">
    <div class="label">position</div>
    <div class="value" id="pos-display">0, 0, 0</div>
    <br>
    <div class="label">altitude</div>
    <div class="value" id="alt-display">0.0</div>
    <br>
    <div class="label">speed</div>
    <div id="speed-bar-wrap"><div id="speed-bar"></div></div>
  </div>
  <div id="wind-hud">
    <div class="label">wind</div>
    <div class="value" id="wind-display">calm</div>
    <div id="wind-compass">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="22" fill="none" stroke="rgba(100,200,255,0.2)" stroke-width="1"/>
        <circle cx="24" cy="24" r="2" fill="rgba(100,200,255,0.4)"/>
        <polygon id="wind-arrow" points="24,4 28,24 24,20 20,24" fill="rgba(100,200,255,0.8)"/>
      </svg>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // ─── Scene Setup ────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.9;
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050810);
  scene.fog = new THREE.FogExp2(0x050810, 0.018);

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 300);

  // ─── Lighting ───────────────────────────────────────────────────
  const ambient = new THREE.AmbientLight(0x0a1020, 1.5);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0x80ffdd, 2.5);
  sun.position.set(30, 60, 20);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 200;
  sun.shadow.camera.left = -80;
  sun.shadow.camera.right = 80;
  sun.shadow.camera.top = 80;
  sun.shadow.camera.bottom = -80;
  scene.add(sun);

  const fill = new THREE.PointLight(0x003366, 3, 80);
  fill.position.set(-20, 10, -20);
  scene.add(fill);

  // ─── Ground ─────────────────────────────────────────────────────
  const groundGeo = new THREE.PlaneGeometry(400, 400, 80, 80);
  // Subtle vertex displacement
  const posArr = groundGeo.attributes.position.array;
  for (let i = 0; i < posArr.length; i += 3) {
    const x = posArr[i], z = posArr[i+2];
    posArr[i+1] = (Math.sin(x * 0.08) * Math.cos(z * 0.08)) * 0.4
                + (Math.sin(x * 0.3 + 1.2) * Math.cos(z * 0.2)) * 0.1;
  }
  groundGeo.computeVertexNormals();

  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x0a0f1a,
    roughness: 0.95,
    metalness: 0.05,
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid overlay
  const gridHelper = new THREE.GridHelper(400, 80, 0x00ffb4, 0x0d1f2d);
  gridHelper.position.y = 0.01;
  scene.add(gridHelper);

  // ─── Player Cube ────────────────────────────────────────────────
  const playerGeo = new THREE.BoxGeometry(1, 1, 1);
  const playerMat = new THREE.MeshStandardMaterial({
    color: 0x00ffb4,
    emissive: 0x00ffb4,
    emissiveIntensity: 0.25,
    roughness: 0.3,
    metalness: 0.6,
  });
  const player = new THREE.Mesh(playerGeo, playerMat);
  player.castShadow = true;
  player.position.set(0, 0.5, 0);
  scene.add(player);

  // Glow light attached to player
  const playerLight = new THREE.PointLight(0x00ffb4, 1.5, 8);
  player.add(playerLight);

  // Edge highlight
  const edgesGeo = new THREE.EdgesGeometry(playerGeo);
  const edgesMat = new THREE.LineBasicMaterial({ color: 0x00ffb4, transparent: true, opacity: 0.7 });
  const edges = new THREE.LineSegments(edgesGeo, edgesMat);
  player.add(edges);

  // ─── World Objects ──────────────────────────────────────────────
  const palette = [0x1a3a5c, 0x0d2235, 0x102030, 0x153045, 0x0f1e2d];
  const accentPalette = [0x00ffb4, 0x00a8ff, 0xff6b35, 0xffd700, 0xff4488];

  function makeBox(w, h, d, x, z, colorIdx) {
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshStandardMaterial({
      color: palette[colorIdx % palette.length],
      roughness: 0.7,
      metalness: 0.3,
      emissive: palette[colorIdx % palette.length],
      emissiveIntensity: 0.05,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, h / 2, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);

    // Occasionally add accent trim
    if (Math.random() < 0.4) {
      const edG = new THREE.EdgesGeometry(geo);
      const accent = accentPalette[Math.floor(Math.random() * accentPalette.length)];
      const edM = new THREE.LineBasicMaterial({ color: accent, transparent: true, opacity: 0.3 });
      const edMesh = new THREE.LineSegments(edG, edM);
      mesh.add(edMesh);
    }

    return mesh;
  }

  const obstacles = [];
  const rng = (a, b) => a + Math.random() * (b - a);

  // Scattered blocks
  for (let i = 0; i < 120; i++) {
    let x, z;
    do {
      x = rng(-90, 90);
      z = rng(-90, 90);
    } while (Math.abs(x) < 6 && Math.abs(z) < 6);

    const w = rng(1.5, 6);
    const h = rng(1, 10);
    const d = rng(1.5, 6);
    const box = makeBox(w, h, d, x, z, Math.floor(Math.random() * 5));
    obstacles.push({ mesh: box, minX: x - w/2, maxX: x + w/2, minZ: z - d/2, maxZ: z + d/2 });
  }

  // Long walls
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI;
    const cx = rng(-70, 70), cz = rng(-70, 70);
    const len = rng(8, 30);
    const h = rng(2, 5);
    const geo = new THREE.BoxGeometry(len, h, 0.8);
    const mat = new THREE.MeshStandardMaterial({ color: 0x0d1f30, roughness: 0.8, metalness: 0.2 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.y = angle;
    mesh.position.set(cx, h/2, cz);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
  }

  // Glowing pillars
  for (let i = 0; i < 15; i++) {
    const x = rng(-85, 85), z = rng(-85, 85);
    const h = rng(5, 18);
    const geo = new THREE.CylinderGeometry(0.15, 0.15, h, 6);
    const color = accentPalette[Math.floor(Math.random() * accentPalette.length)];
    const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.8, roughness: 0.2 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, h/2, z);
    scene.add(mesh);
    const pLight = new THREE.PointLight(color, 1.2, 12);
    pLight.position.set(x, h * 0.6, z);
    scene.add(pLight);
  }

  // Floating rings
  const rings = [];
  for (let i = 0; i < 12; i++) {
    const x = rng(-80, 80), z = rng(-80, 80);
    const y = rng(3, 10);
    const geo = new THREE.TorusGeometry(2, 0.08, 6, 32);
    const color = accentPalette[Math.floor(Math.random() * accentPalette.length)];
    const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 1, roughness: 0 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.rotation.x = Math.PI / 2;
    scene.add(mesh);
    rings.push({ mesh, baseY: y, phase: Math.random() * Math.PI * 2 });
  }

  // Stars / particles
  const starGeo = new THREE.BufferGeometry();
  const starVerts = [];
  for (let i = 0; i < 3000; i++) {
    starVerts.push(rng(-200, 200), rng(5, 200), rng(-200, 200));
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
  const starMat = new THREE.PointsMaterial({ color: 0x4488aa, size: 0.25, transparent: true, opacity: 0.6 });
  scene.add(new THREE.Points(starGeo, starMat));

  // ─── Camera rig ─────────────────────────────────────────────────
  const camPivot = new THREE.Object3D();
  scene.add(camPivot);
  camPivot.add(camera);
  camera.position.set(0, 3, 8);
  camera.lookAt(new THREE.Vector3(0, 1, 0));


  // ─── Audio ──────────────────────────────────────────────────────
  function makeAudio(b64, volume=1.0, loop=false) {
    const audio = new Audio('data:audio/mp3;base64,' + b64);
    audio.volume = volume;
    audio.loop = loop;
    return audio;

  // Start Kirk after first user interaction (browser autoplay policy)
  let kirkStarted = false;
  function tryStartKirk() {
    if (!kirkStarted) {
      sndKirk.play().catch(()=>{});
      kirkStarted = true;
    }
  }

  function playMeow() {
    sndMeow.currentTime = 0;
    sndMeow.play().catch(()=>{});
  }

  let rizzCooldown = 0;
  function playRizz() {
    if (rizzCooldown > 0) return;
    sndRizz.currentTime = 0;
    sndRizz.play().catch(()=>{});
    rizzCooldown = 0.5; // half-second cooldown so it doesn't spam
  }
  // ─── Controls ───────────────────────────────────────────────────
  const keys = {};
  let yaw = 0, pitch = 0;
  let isLocked = false;
  let started = false;

  document.addEventListener('keydown', e => { keys[e.code] = true; });
  document.addEventListener('keyup',   e => { keys[e.code] = false; });

  const overlay  = document.getElementById('overlay');
  const startBtn = document.getElementById('start-btn');
  const pausedMsg = document.getElementById('paused-msg');
  const gustFlash = document.getElementById('gust-flash');

  startBtn.addEventListener('click', () => {
    started = true;
    overlay.classList.add('hidden');
    renderer.domElement.requestPointerLock();
    tryStartKirk();
  });

  document.addEventListener('pointerlockchange', () => {
    isLocked = document.pointerLockElement === renderer.domElement;
    if (!isLocked && started) pausedMsg.classList.add('visible');
    else pausedMsg.classList.remove('visible');
  });

  renderer.domElement.addEventListener('click', () => {
    if (started && !isLocked) renderer.domElement.requestPointerLock();
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Escape' && started && isLocked) document.exitPointerLock();
  });

  document.addEventListener('mousemove', e => {
    if (!isLocked) return;
    const sens = 0.002;
    yaw   -= e.movementX * sens;
    pitch -= e.movementY * sens;
    pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));
  });

  // ─── Physics Constants ──────────────────────────────────────────
  const SPEED        = 7;
  const SPRINT       = 14;
  const GRAVITY      = 5.5;       // weak gravity — floaty feel
  const JUMP_FORCE   = 3.2;       // jump impulse — lowered
  const GROUND_Y     = 0.5;
  const GROUND_DRAG  = 0.78;      // friction on ground
  const AIR_DRAG     = 0.985;     // almost no air drag — drifts forever
  const AIR_CTRL     = 0.25;      // reduced control in air

  // ─── Wind System ────────────────────────────────────────────────
  const wind = {
    current:  new THREE.Vector3(0, 0, 0),  // current wind force
    target:   new THREE.Vector3(0, 0, 0),  // where wind is heading
    gust:     new THREE.Vector3(0, 0, 0),  // sharp gust spike
    strength: 0,
    nextGustIn: 2,
    gustActive: 0,
    gustDir:  new THREE.Vector3(),
  };

  // Smooth noise helpers
  function smoothRnd(t, freq) {
    return Math.sin(t * freq) * Math.cos(t * freq * 0.7 + 1.3)
         + Math.sin(t * freq * 1.9 + 2.1) * 0.5;
  }

  function updateWind(dt, t) {
    // Slowly drift target using layered sines — feels organic
    wind.target.x = smoothRnd(t, 0.11) * 6;
    wind.target.z = smoothRnd(t, 0.09) * 6;
    wind.target.y = smoothRnd(t, 0.07) * 1.8;  // mild updrafts/downdrafts

    // Lerp current toward target
    wind.current.lerp(wind.target, dt * 0.4);
    wind.strength = wind.current.length();

    // ── Random gust scheduling ──
    wind.nextGustIn -= dt;
    if (wind.nextGustIn <= 0) {
      // Fire a gust!
      const gustMag = 10 + Math.random() * 18;
      const angle   = Math.random() * Math.PI * 2;
      const lift    = (Math.random() - 0.3) * 8;  // usually lifts slightly
      wind.gust.set(
        Math.cos(angle) * gustMag,
        lift,
        Math.sin(angle) * gustMag
      );
      wind.gustActive  = 0.35 + Math.random() * 0.4;  // gust duration
      wind.nextGustIn  = 3 + Math.random() * 8;       // gap before next

      // Screen flash
      gustFlash.classList.add('active');
      setTimeout(() => gustFlash.classList.remove('active'), 200);
    }

    // Decay gust
    if (wind.gustActive > 0) {
      wind.gustActive -= dt;
      wind.gust.multiplyScalar(0.92);
    } else {
      wind.gust.multiplyScalar(0.8);
    }
  }

  // ─── Player State ───────────────────────────────────────────────
  const vel      = new THREE.Vector3();
  let onGround   = true;
  let jumpsLeft  = 2;          // double jump allowed
  let jumpHeld   = false;

  // ─── AABB Collision ─────────────────────────────────────────────
  function resolveCollision(pos) {
    const hs = 0.5;
    for (const ob of obstacles) {
      if (pos.x + hs > ob.minX && pos.x - hs < ob.maxX &&
          pos.z + hs > ob.minZ && pos.z - hs < ob.maxZ) {
        const overlapX = Math.min(pos.x + hs - ob.minX, ob.maxX - (pos.x - hs));
        const overlapZ = Math.min(pos.z + hs - ob.minZ, ob.maxZ - (pos.z - hs));
        if (overlapX < overlapZ) {
          pos.x += pos.x < (ob.minX + ob.maxX) / 2 ? -overlapX : overlapX;
          vel.x *= -0.3;
          playRizz();
        } else {
          pos.z += pos.z < (ob.minZ + ob.maxZ) / 2 ? -overlapZ : overlapZ;
          vel.z *= -0.3;
          playRizz();
        }
      }
    }
    const BOUND = 95;
    pos.x = Math.max(-BOUND, Math.min(BOUND, pos.x));
    pos.z = Math.max(-BOUND, Math.min(BOUND, pos.z));
  }

  // ─── Wind particles (leaves / debris) ───────────────────────────
  const DEBRIS_COUNT = 60;
  const debrisGeo = new THREE.BufferGeometry();
  const debrisPos = new Float32Array(DEBRIS_COUNT * 3);
  const debrisVel = [];
  for (let i = 0; i < DEBRIS_COUNT; i++) {
    debrisPos[i*3]   = rng(-30, 30);
    debrisPos[i*3+1] = rng(0, 15);
    debrisPos[i*3+2] = rng(-30, 30);
    debrisVel.push(new THREE.Vector3(rng(-1,1), rng(-0.2,0.2), rng(-1,1)));
  }
  debrisGeo.setAttribute('position', new THREE.BufferAttribute(debrisPos, 3));
  const debrisMat = new THREE.PointsMaterial({
    color: 0x88ddff, size: 0.12, transparent: true, opacity: 0.45,
    sizeAttenuation: true,
  });
  const debrisParticles = new THREE.Points(debrisGeo, debrisMat);
  scene.add(debrisParticles);

  // ─── HUD refs ───────────────────────────────────────────────────
  const posDisplay  = document.getElementById('pos-display');
  const altDisplay  = document.getElementById('alt-display');
  const speedBar    = document.getElementById('speed-bar');
  const windDisplay = document.getElementById('wind-display');
  const windArrow   = document.getElementById('wind-arrow');

  // ─── Clock ──────────────────────────────────────────────────────
  const clock = new THREE.Clock();
  let totalTime = 0;

  // Tumble target rotation separate from movement
  const tumble = new THREE.Euler(0, 0, 0);

  // ─── Animate ────────────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    totalTime += dt;

    rizzCooldown = Math.max(0, rizzCooldown - dt);
    updateWind(dt, totalTime);

    if (isLocked) {
      const sprint = keys['ShiftLeft'] || keys['ShiftRight'];
      const speed  = sprint ? SPRINT : SPEED;

      // ── Input ──
      const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
      const right   = new THREE.Vector3( Math.cos(yaw), 0, -Math.sin(yaw));
      const move = new THREE.Vector3();
      if (keys['KeyW'] || keys['ArrowUp'])    move.add(forward);
      if (keys['KeyS'] || keys['ArrowDown'])  move.sub(forward);
      if (keys['KeyA'] || keys['ArrowLeft'])  move.sub(right);
      if (keys['KeyD'] || keys['ArrowRight']) move.add(right);
      if (move.lengthSq() > 0) move.normalize();

      const ctrl = onGround ? 1.0 : AIR_CTRL;
      vel.x += move.x * speed * ctrl * dt;
      vel.z += move.z * speed * ctrl * dt;

      // ── Jump ──
      const wantJump = keys['Space'];
      if (wantJump && !jumpHeld && jumpsLeft > 0) {
        vel.y = JUMP_FORCE;
        jumpsLeft--;
        jumpHeld = true;
        onGround = false;
        playMeow();
      }
      if (!wantJump) jumpHeld = false;

      // ── Wind force ──
      // Less effect on ground (friction), full effect in air
      const windMult = onGround ? 0.08 : 1.0;
      const totalWind = wind.current.clone().add(wind.gust);
      vel.x += totalWind.x * windMult * dt;
      vel.z += totalWind.z * windMult * dt;
      vel.y += totalWind.y * windMult * dt;

      // ── Gravity ──
      if (!onGround) {
        vel.y -= GRAVITY * dt;
      }

      // ── Drag ──
      const drag = onGround ? GROUND_DRAG : AIR_DRAG;
      vel.x *= drag;
      vel.z *= drag;
      // Vertical drag: more resistance going up, less going down (floaty)
      vel.y *= onGround ? 1.0 : (vel.y > 0 ? 0.992 : 0.997);

      // ── Integrate position ──
      player.position.x += vel.x;
      player.position.y += vel.y;
      player.position.z += vel.z;

      // ── Ground check ──
      if (player.position.y <= GROUND_Y) {
        player.position.y = GROUND_Y;
        vel.y = Math.max(vel.y, 0);
        onGround = true;
        jumpsLeft = 2;
      } else {
        onGround = false;
      }

      resolveCollision(player.position);

      // ── Cube tumble ──
      // In air: wind drives tumbling rotation
      const windSpeed = totalWind.length();
      const airborne  = player.position.y > GROUND_Y + 0.1;
      if (airborne) {
        // Tumble axis perpendicular to wind direction
        player.rotation.x += (totalWind.z * 0.015 + vel.z * 0.04);
        player.rotation.z -= (totalWind.x * 0.015 + vel.x * 0.04);
        player.rotation.y += windSpeed * 0.008 + vel.length() * 0.01;
      } else {
        // On ground: gentle tilt
        player.rotation.x += (vel.z * 0.12 - player.rotation.x) * 0.15;
        player.rotation.z += (-vel.x * 0.12 - player.rotation.z) * 0.15;
        player.rotation.y += vel.length() * 0.03;
      }

      // ── Camera follow ──
      // Camera lags behind more when blown by wind — cinematic
      const lagSpeed = onGround ? 0.12 : 0.06;
      camPivot.position.lerp(player.position, lagSpeed);
      camPivot.rotation.y = yaw;
      camera.rotation.x = pitch;

      // ── HUD ──
      posDisplay.textContent  = `${player.position.x.toFixed(1)}, ${player.position.z.toFixed(1)}`;
      altDisplay.textContent  = Math.max(0, player.position.y - GROUND_Y).toFixed(2) + 'm';
      const sp  = new THREE.Vector2(vel.x, vel.z).length();
      const pct = Math.min(sp / SPRINT * 100, 100).toFixed(0);
      speedBar.style.width = pct + '%';

      // Wind compass
      const wStrength = totalWind.length();
      const labels = ['calm','breeze','gusty','GALE','STORM'];
      windDisplay.textContent = labels[Math.min(Math.floor(wStrength / 5), 4)];
      const windAngleDeg = Math.atan2(totalWind.x, totalWind.z) * (180 / Math.PI);
      windArrow.style.transform = `rotate(${windAngleDeg}deg) translate(0,0)`;
      windArrow.style.transformOrigin = '24px 24px';
      const wAlpha = Math.min(wStrength / 20, 1);
      windArrow.style.opacity = 0.2 + wAlpha * 0.8;
    }

    // ── Debris particles follow wind ──
    const pa = debrisGeo.attributes.position.array;
    const wf = wind.current.clone().add(wind.gust);
    for (let i = 0; i < DEBRIS_COUNT; i++) {
      debrisVel[i].x += wf.x * 0.008 + (Math.random()-0.5)*0.05;
      debrisVel[i].y += wf.y * 0.004 - 0.01 + (Math.random()-0.5)*0.02;
      debrisVel[i].z += wf.z * 0.008 + (Math.random()-0.5)*0.05;
      debrisVel[i].multiplyScalar(0.97);

      pa[i*3]   += debrisVel[i].x;
      pa[i*3+1] += debrisVel[i].y;
      pa[i*3+2] += debrisVel[i].z;

      // Wrap particles back near player
      const px = player.position;
      if (Math.abs(pa[i*3]   - px.x) > 40) pa[i*3]   = px.x + rng(-20, 20);
      if (pa[i*3+1] < 0 || pa[i*3+1] > 30) pa[i*3+1] = rng(0.5, 8);
      if (Math.abs(pa[i*3+2] - px.z) > 40) pa[i*3+2] = px.z + rng(-20, 20);
    }
    debrisGeo.attributes.position.needsUpdate = true;

    // ── Rings ──
    for (const r of rings) {
      r.mesh.position.y = r.baseY + Math.sin(totalTime * 0.8 + r.phase) * 0.4;
      r.mesh.rotation.z = totalTime * 0.3 + r.phase;
    }

    gridHelper.position.y = 0.01 + Math.sin(totalTime * 0.5) * 0.003;
    playerMat.emissiveIntensity = 0.2 + Math.sin(totalTime * 3) * 0.08;

    renderer.render(scene, camera);
  }

  animate();

  // ─── Resize ─────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

})();
</script>
</body>
</html>
